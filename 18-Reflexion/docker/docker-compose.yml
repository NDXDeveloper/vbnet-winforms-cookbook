name: metadonnees

services:
  mariadb:
    image: mariadb:12.3
    container_name: metadonnees-mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: "${MARIADB_ROOT_PASSWORD:-root_demo_pwd}"
      MARIADB_DATABASE:      "${MARIADB_DATABASE:-metadonnees}"
      MARIADB_USER:          "${MARIADB_APP_USER:-metadonnees_app}"
      MARIADB_PASSWORD:      "${MARIADB_APP_PASSWORD:-metadonnees_pwd}"
    ports:
      - "${MARIADB_HOST_PORT:-3323}:3306"
    volumes:
      - metadonnees-data:/var/lib/mysql
      - ./init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

volumes:
  metadonnees-data:
    name: metadonnees-data
