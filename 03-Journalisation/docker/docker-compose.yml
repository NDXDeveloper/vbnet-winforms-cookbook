# Nom de projet Compose explicite : isole cette pile des autres projets.
name: journal

services:
  mariadb:
    image: mariadb:12.3
    container_name: journal-mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: "${MARIADB_ROOT_PASSWORD:-root_demo_pwd}"
      MARIADB_DATABASE:      "${MARIADB_DATABASE:-journal}"
      MARIADB_USER:          "${MARIADB_APP_USER:-journal_app}"
      MARIADB_PASSWORD:      "${MARIADB_APP_PASSWORD:-journal_pwd}"
    ports:
      - "${MARIADB_HOST_PORT:-3309}:3306"
    volumes:
      - journal-data:/var/lib/mysql
      - ./init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

volumes:
  journal-data:
    name: journal-data
