name: classeur

services:
  mariadb:
    image: mariadb:12.3
    container_name: classeur-mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: "${MARIADB_ROOT_PASSWORD:-root_demo_pwd}"
      MARIADB_DATABASE:      "${MARIADB_DATABASE:-classeur}"
      MARIADB_USER:          "${MARIADB_APP_USER:-classeur_app}"
      MARIADB_PASSWORD:      "${MARIADB_APP_PASSWORD:-classeur_pwd}"
    ports:
      - "${MARIADB_HOST_PORT:-3324}:3306"
    volumes:
      - classeur-data:/var/lib/mysql
      - ./init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

volumes:
  classeur-data:
    name: classeur-data
