name: catalogue-liens

services:
  mariadb:
    image: mariadb:12.3
    container_name: catalogue-liens-mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: "${MARIADB_ROOT_PASSWORD:-root_demo_pwd}"
      MARIADB_DATABASE:      "${MARIADB_DATABASE:-catalogue_liens}"
      MARIADB_USER:          "${MARIADB_APP_USER:-catalogue_app}"
      MARIADB_PASSWORD:      "${MARIADB_APP_PASSWORD:-catalogue_pwd}"
    ports:
      - "${MARIADB_HOST_PORT:-3317}:3306"
    volumes:
      - catalogue-liens-data:/var/lib/mysql
      - ./init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

volumes:
  catalogue-liens-data:
    name: catalogue-liens-data
