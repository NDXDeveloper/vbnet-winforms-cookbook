# =============================================================================
#  Etabli - Pile de demonstration MariaDB 12.3 LTS
# -----------------------------------------------------------------------------
#  Projet 01 : base de demonstration pour les techniques d'acces aux donnees
#  (requetes parametrees, transactions, journalisation des erreurs).
#
#  Demarrage :   docker compose up -d
#  Arret      :   docker compose down            (conserve les donnees)
#  Reset      :   docker compose down -v          (supprime le volume = repart a zero)
#
#  Au tout premier demarrage (volume vide), MariaDB execute, dans l'ordre
#  alphabetique, tous les scripts *.sql montes dans /docker-entrypoint-initdb.d.
#  C'est ainsi que le schema puis les donnees de demo sont charges.
# =============================================================================

# Nom de projet Compose explicite : isole cette pile des autres projets de la
# serie (sans cela, le nom du dossier "docker" servirait de nom de projet et
# provoquerait des collisions entre projets).
name: etabli

services:
  mariadb:
    image: mariadb:12.3
    container_name: etabli-mariadb
    restart: unless-stopped

    # --- Parametrage transmis a l'image officielle MariaDB --------------------
    # L'image cree automatiquement la base et le compte applicatif. Le compte
    # est cree via "CREATE USER ... IDENTIFIED BY ...", qui sous MariaDB utilise
    # le plugin d'authentification mysql_native_password : c'est exactement ce
    # qu'attend le connecteur MySql.Data cote .NET.
    environment:
      MARIADB_ROOT_PASSWORD: "${MARIADB_ROOT_PASSWORD:-root_demo_pwd}"
      MARIADB_DATABASE:      "${MARIADB_DATABASE:-etabli}"
      MARIADB_USER:          "${MARIADB_APP_USER:-etabli_app}"
      MARIADB_PASSWORD:      "${MARIADB_APP_PASSWORD:-etabli_pwd}"

    # --- Exposition reseau ----------------------------------------------------
    # Port hote 3307 -> port conteneur 3306, pour cohabiter avec un eventuel
    # serveur MySQL/MariaDB deja present sur 3306.
    ports:
      - "${MARIADB_HOST_PORT:-3307}:3306"

    # --- Persistance et scripts d'initialisation ------------------------------
    volumes:
      - etabli-data:/var/lib/mysql
      - ./init:/docker-entrypoint-initdb.d:ro

    # --- Sonde de sante -------------------------------------------------------
    # healthcheck.sh est fourni par l'image MariaDB. "depends_on: condition:
    # service_healthy" (d'un autre service) pourrait s'appuyer dessus.
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

# Volume nomme : les donnees survivent a "docker compose down".
volumes:
  etabli-data:
    name: etabli-data
